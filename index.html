<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-[#e2e8f0] antialiased min-h-screen flex items-center justify-center p-4">
    <div id="public-page-marker" class="hidden"></div>
    
    <!-- Loading State -->
    <div id="loading-view" class="text-center w-full max-w-md">
        <svg class="animate-spin h-10 w-10 text-[#10b981] mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        <p class="mt-4 text-[#888888] font-medium text-[13px]">Validating Link...</p>
    </div>

    <!-- Error State -->
    <div id="error-view" class="text-center w-full max-w-md hidden bg-[#161616] p-8 rounded-xl border border-[#262626]">
        <div class="h-16 w-16 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 border border-red-500/20">
            <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        </div>
        <h2 class="text-[17px] font-semibold text-[#e2e8f0]">Invalid Link</h2>
        <p class="text-[#888888] mt-2 text-[13px]" id="error-message">This registration link is invalid or the admin account is not active. Please ask the admin for the correct link.</p>
    </div>

    <!-- Registration Form View -->
    <div id="registration-view" class="w-full max-w-md hidden">
        <div class="bg-[#161616] p-8 rounded-xl border border-[#262626]">
            <div class="text-center mb-8">
                <h2 class="text-[20px] font-bold text-[#e2e8f0]">Join our VIP Group</h2>
                <p class="text-[#888888] text-[13px] mt-1.5">Invited by <span id="admin-name-display" class="font-semibold text-[#10b981]">Admin</span></p>
            </div>

            <form id="public-reg-form" class="space-y-4">
                <div>
                    <label class="block text-[12px] text-[#888888] mb-1.5 focus:outline-none">Full Name</label>
                    <input type="text" id="reg-name" required class="w-full px-3 py-2.5 bg-[#0a0a0a] border border-[#262626] rounded-md focus:border-[#10b981] outline-none text-[13px] text-[#e2e8f0] transition-colors box-border" placeholder="John Doe">
                </div>
                <div>
                    <label class="block text-[12px] text-[#888888] mb-1.5 focus:outline-none">Telegram Username</label>
                    <input type="text" id="reg-telegram" required class="w-full px-3 py-2.5 bg-[#0a0a0a] border border-[#262626] rounded-md focus:border-[#10b981] outline-none text-[13px] text-[#e2e8f0] transition-colors box-border" placeholder="@username">
                </div>
                <div>
                    <label class="block text-[12px] text-[#888888] mb-1.5 focus:outline-none">WhatsApp Number</label>
                    <input type="tel" id="reg-whatsapp" required class="w-full px-3 py-2.5 bg-[#0a0a0a] border border-[#262626] rounded-md focus:border-[#10b981] outline-none text-[13px] text-[#e2e8f0] transition-colors box-border" placeholder="+1234567890">
                </div>
                <button type="submit" id="reg-submit-btn" class="w-full mt-6 bg-[#10b981] hover:bg-[#0e9f6e] text-black text-[13px] font-semibold py-2.5 rounded-md transition-colors outline-none flex items-center justify-center gap-2">
                    Complete & Join Telegram
                </button>
            </form>
        </div>
        <div class="mt-8 text-center text-[12px] text-[#888888]">
            &copy; 2026 Admin Panel System &bull; <a href="admin.html" class="hover:text-[#e2e8f0] transition-colors underline underline-offset-2">Admin Portal</a>
        </div>
    </div>

    <!-- Include main app script -->
    <script type="module" src="./app.js"></script>
</body>
</html>
